name: RSS Pipeline — Fetch & Generate Perspectives

on:
  # Cada 30 minutos (offset para no chocar con el cron de GitHub)
  schedule:
    - cron: '7 * * * *'   # :07 de cada hora
    - cron: '37 * * * *'  # :37 de cada hora

  # Ejecutable manualmente
  workflow_dispatch:
    inputs:
      maxPerSource:
        description: 'Máx. artículos por fuente (1-3)'
        required: false
        default: '1'
      dryRun:
        description: 'Dry run (true = solo simular)'
        required: false
        default: 'false'

jobs:
  fetch-and-generate:
    name: ${{ matrix.source }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Una fuente por job → corren en paralelo, cada uno tarda ~60s
    strategy:
      fail-fast: false
      matrix:
        source: [infobae, lanacion, pagina12, perfil, ambito, cronista]

    steps:
      - name: 🗞️ Procesar ${{ matrix.source }}
        id: pipeline
        run: |
          MAX="${{ github.event.inputs.maxPerSource || '1' }}"
          DRY="${{ github.event.inputs.dryRun || 'false' }}"

          BODY=$(jq -n \
            --arg max "$MAX" \
            --argjson dry "$DRY" \
            --arg src "${{ matrix.source }}" \
            '{maxPerSource: ($max|tonumber), dryRun: $dry, source: $src}')

          echo "📤 ${{ matrix.source }} → $BODY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 270 \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/fetch-rss-pipeline" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY_RESP=$(echo "$RESPONSE" | head -n -1)

          echo "📥 HTTP $HTTP_CODE"
          echo "$BODY_RESP" | python3 -c 'import json,sys; d=json.load(sys.stdin); print("Procesados:",d.get("processed",0)); print("Errores:",d.get("errors",0)); [print("->",r.get("title","")[:70]) for r in d.get("results",[])]' || echo "$BODY_RESP"

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::${{ matrix.source }} falló con HTTP $HTTP_CODE"
          fi

  summary:
    name: 📊 Resumen
    runs-on: ubuntu-latest
    needs: fetch-and-generate
    if: always()
    steps:
      - name: Resumen
        run: |
          echo "## RSS Pipeline — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fuentes procesadas: infobae · lanacion · pagina12 · perfil · ambito · cronista" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Revisá cada job individual para ver los artículos procesados." >> $GITHUB_STEP_SUMMARY
