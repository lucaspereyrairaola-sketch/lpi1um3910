name: RSS Pipeline — Fetch & Generate Perspectives

on:
  # Cada 30 minutos
  schedule:
    - cron: '7 * * * *'   # :07 de cada hora
    - cron: '37 * * * *'  # :37 de cada hora

  # También ejecutable manualmente desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      maxPerSource:
        description: 'Máx. artículos por fuente (1-10)'
        required: false
        default: '3'
      dryRun:
        description: 'Dry run (true = solo simular, no guardar)'
        required: false
        default: 'false'
      source:
        description: 'Fuente específica (infobae|lanacion|pagina12|perfil|ambito|cronista) — dejar vacío para todas'
        required: false
        default: ''

jobs:
  fetch-and-generate:
    name: Fetch RSS → Generate Perspectives
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🗞️ Llamar al pipeline RSS
        id: pipeline
        run: |
          # Construir body del request
          MAX="${{ github.event.inputs.maxPerSource || '3' }}"
          DRY="${{ github.event.inputs.dryRun || 'false' }}"
          SOURCE="${{ github.event.inputs.source || '' }}"

          if [ -n "$SOURCE" ]; then
            BODY=$(jq -n --arg max "$MAX" --argjson dry "$DRY" --arg src "$SOURCE" \
              '{maxPerSource: ($max|tonumber), dryRun: $dry, source: $src}')
          else
            BODY=$(jq -n --arg max "$MAX" --argjson dry "$DRY" \
              '{maxPerSource: ($max|tonumber), dryRun: $dry}')
          fi

          echo "📤 Request body: $BODY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 600 \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/fetch-rss-pipeline" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY_RESP=$(echo "$RESPONSE" | head -n -1)

          echo "📥 HTTP Status: $HTTP_CODE"
          echo "📥 Response: $BODY_RESP"

          # Extraer métricas
          PROCESSED=$(echo "$BODY_RESP" | jq -r '.processed // 0')
          ERRORS=$(echo "$BODY_RESP" | jq -r '.errors // 0')

          echo "✅ Procesados: $PROCESSED"
          echo "❌ Errores: $ERRORS"

          echo "processed=$PROCESSED" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Pipeline falló con HTTP $HTTP_CODE"
            exit 1
          fi

      - name: 📊 Resumen
        if: always()
        run: |
          echo "## RSS Pipeline Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Artículos procesados | ${{ steps.pipeline.outputs.processed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errores | ${{ steps.pipeline.outputs.errors }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Status | ${{ steps.pipeline.outputs.http_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ejecutado | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
